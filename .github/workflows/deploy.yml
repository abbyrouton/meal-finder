name: Deploy to Lightsail

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      SSH_HOST: ${{ secrets.SSH_HOST }}
      SSH_USERNAME: ${{ secrets.SSH_USERNAME }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts

      - name: Deploy files
        run: |
          rsync -avz --delete -e "ssh -i ~/.ssh/deploy_key" \
            .next/standalone/ \
            "${SSH_USERNAME}@${SSH_HOST}:~/meal-finder-standalone/"

          rsync -avz -e "ssh -i ~/.ssh/deploy_key" \
            .next/static/ \
            "${SSH_USERNAME}@${SSH_HOST}:~/meal-finder-standalone/.next/static/"

          rsync -avz -e "ssh -i ~/.ssh/deploy_key" \
            public/ \
            "${SSH_USERNAME}@${SSH_HOST}:~/meal-finder-standalone/public/"

      - name: Restart app
        run: |
          ssh -i ~/.ssh/deploy_key "${SSH_USERNAME}@${SSH_HOST}" \
            "cd ~/meal-finder-standalone && pm2 restart meal-finder || pm2 start server.js --name meal-finder && pm2 save"

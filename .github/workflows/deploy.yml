name: Deploy to Lightsail

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: ".next/standalone/,.next/static/,public/"
          target: "~/meal-finder-deploy"
          strip_components: 0

      - name: Restart app
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            rm -rf ~/meal-finder-standalone
            mv ~/meal-finder-deploy/.next/standalone ~/meal-finder-standalone
            mkdir -p ~/meal-finder-standalone/.next
            mv ~/meal-finder-deploy/.next/static ~/meal-finder-standalone/.next/static
            mv ~/meal-finder-deploy/public ~/meal-finder-standalone/public
            rm -rf ~/meal-finder-deploy
            cd ~/meal-finder-standalone
            pm2 restart meal-finder || pm2 start server.js --name meal-finder
            pm2 save
